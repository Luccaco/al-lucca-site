  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

D-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Roboto Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"277159d9-1b84-4354-9c33-814e836c6bc3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    @font-face { font-family: 'Neue Haas'; src: local('Helvetica Neue'); }\n    @keyframes vhsflicker {\n      0% { opacity: 0.97; }\n      20% { opacity: 1; }\n      22% { opacity: 0.94; }\n      24% { opacity: 1; }\n      55% { opacity: 0.98; }\n      57% { opacity: 0.9; }\n      59% { opacity: 1; }\n      100% { opacity: 1; }\n    }\n    @keyframes scanroll {\n      0% { transform: translateY(0%); }\n      100% { transform: translateY(100%); }\n    }\n    @keyframes noiseShift {\n      0%, 100% { transform: translate(0,0); }\n      10% { transform: translate(-1%,-1%); }\n      20% { transform: translate(1%,1%); }\n      30% { transform: translate(-1%,1%); }\n      40% { transform: translate(1%,-1%); }\n      50% { transform: translate(-1%,0%); }\n      60% { transform: translate(1%,0%); }\n      70% { transform: translate(0%,-1%); }\n      80% { transform: translate(0%,1%); }\n      90% { transform: translate(-1%,-1%); }\n    }\n    html, body { margin: 0; padding: 0; background: #050505; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"position:relative; width:100vw; height:100vh; overflow:hidden; background:#050505; font-family:'Roboto Mono', 'Courier New', monospace;\">\n\n  <!-- VIDEO BACKGROUND -->\n  <video ref=\"{{ videoRef }}\" src=\"{{ videoSrc }}\" autoplay=\"{{ true }}\" muted=\"{{ true }}\" loop=\"{{ true }}\" playsinline=\"{{ true }}\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position: {{ videoObjectPosition }}; filter: {{ vhsFilter }}; animation: vhsflicker 3.2s infinite steps(1); z-index:1;\"><\u002Fvideo>\n\n  <!-- COLOR ABERRATION LAYER -->\n  <div style=\"position:absolute; inset:0; z-index:2; mix-blend-mode:screen; pointer-events:none; background:transparent; box-shadow: inset 0 0 180px rgba(0,0,0,0.55);\"><\u002Fdiv>\n\n  <!-- SCANLINES -->\n  <div style=\"position:absolute; inset:0; z-index:3; pointer-events:none; opacity:{{ scanlineOpacity }}; background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.35) 0px, rgba(0,0,0,0.35) 1px, transparent 1px, transparent 3px); mix-blend-mode:multiply;\"><\u002Fdiv>\n\n  <!-- MOVING SCANBAND -->\n  <div style=\"position:absolute; left:0; right:0; height:8%; top:-8%; z-index:4; pointer-events:none; background:linear-gradient(to bottom, transparent, rgba(255,255,255,0.05), transparent); animation: scanroll 7s linear infinite;\"><\u002Fdiv>\n\n  <!-- GRAIN / NOISE -->\n  <div style=\"position:absolute; inset:-2%; z-index:5; pointer-events:none; opacity:0.18; mix-blend-mode:overlay; animation: noiseShift 0.4s steps(2) infinite; background-image: url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22&gt;&lt;filter id=%22n%22&gt;&lt;feTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%222%22 stitchTiles=%22stitch%22/&gt;&lt;/filter&gt;&lt;rect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/&gt;&lt;/svg&gt;'); background-size: 180px 180px;\"><\u002Fdiv>\n\n  <!-- VIGNETTE -->\n  <div style=\"position:absolute; inset:0; z-index:6; pointer-events:none; background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.55) 100%);\"><\u002Fdiv>\n\n  <!-- TIMECODE (VHS detail) -->\n  <sc-if value=\"{{ showTimecode }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:absolute; bottom: {{ timecodeBottom }}; right: {{ timecodeRight }}; z-index:8; font-family:'Courier New', monospace; font-size: {{ timecodeSize }}; letter-spacing:1px; color:rgba(255,255,255,0.75); text-shadow:0 0 4px rgba(0,0,0,0.8); mix-blend-mode:screen;\">\n      REC ● {{ timecode }}\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- SWISS GRID CONTENT -->\n  <div style=\"position:absolute; inset:0; z-index:10; display:grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(6, 1fr); padding: {{ gridPadding }}; box-sizing:border-box; pointer-events:none;\">\n\n    <div style=\"grid-column: {{ blockColumn }}; grid-row: {{ blockRow }}; display:flex; flex-direction:column; gap: {{ blockGap }}; pointer-events:auto; margin-left: {{ blockMarginLeft }};\">\n\n      <div style=\"display:flex; align-items:baseline; gap:8px;\">\n        <span style=\"font-size: {{ nameSize }}; font-weight:700; letter-spacing:2.5px; color:#fff; text-transform:uppercase;\">AL LUCCA<\u002Fspan>\n      <\u002Fdiv>\n\n      <p style=\"margin:0; font-size: {{ bioSize }}; line-height:1.55; color:rgba(255,255,255,0.88); max-width: {{ bioMaxWidth }}; font-weight:400; letter-spacing:0.1px;\">\n        NY based, hands-on design leader with nearly two decades of experience shaping high-profile products.\n      <\u002Fp>\n\n      <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:6px; font-size: {{ pathSize }}; letter-spacing:0.8px; color:rgba(255,255,255,0.6); text-transform:uppercase; max-width: {{ pathMaxWidth }};\">\n        <span>SKY TV<\u002Fspan><span style=\"color:rgba(255,255,255,0.6);\">→<\u002Fspan>\n        <span>UNITED NATIONS<\u002Fspan><span style=\"color:rgba(255,255,255,0.6);\">→<\u002Fspan>\n        <span>PARAMOUNT<\u002Fspan><span style=\"color:rgba(255,255,255,0.6);\">→<\u002Fspan>\n        <span>AXIOS<\u002Fspan><span style=\"color:rgba(255,255,255,0.6);\">→<\u002Fspan>\n        <span>SEMAFOR<\u002Fspan><span style=\"color:rgba(255,255,255,0.6);\">→<\u002Fspan>\n        <span>FUBO (DISNEY)<\u002Fspan>\n      <\u002Fdiv>\n\n      <p style=\"margin:0; font-size: {{ contactSize }}; line-height:1.6; color:rgba(255,255,255,0.75);\">\n        Get in touch by <a href=\"mailto:{{ email }}\" style=\"color:#fff; text-decoration:underline; text-underline-offset:2px;\">email<\u002Fa>\n        or <a href=\"{{ linkedin }}\" target=\"_blank\" style=\"color:#fff; text-decoration:underline; text-underline-offset:2px;\">DM me on LinkedIn<\u002Fa>\n      <\u002Fp>\n\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;filterIntensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0,&quot;min&quot;:0,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;VHS Effect&quot;},&quot;scanlines&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.55,&quot;min&quot;:0,&quot;max&quot;:1,&quot;step&quot;:0.05,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;VHS Effect&quot;},&quot;showTimecode&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;VHS Effect&quot;},&quot;email&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;a.lucca@luccaco.com&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Contact&quot;},&quot;linkedin&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://www.linkedin.com/in/allucca&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Contact&quot;}}\">\nclass Component extends DCLogic {\n  state = { seconds: 0, viewportWidth: typeof window !== 'undefined' ? window.innerWidth : 1440 };\n\n  videoRef = React.createRef();\n\n  componentDidMount() {\n    this._t = setInterval(() => {\n      this.setState(s => ({ seconds: s.seconds + 1 }));\n    }, 1000);\n    if (this.videoRef.current) {\n      const p = this.videoRef.current.play();\n      if (p && p.catch) p.catch(() => {});\n    }\n    this._onResize = () => this.setState({ viewportWidth: window.innerWidth });\n    window.addEventListener('resize', this._onResize);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._t);\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  formatTimecode() {\n    const total = this.state.seconds;\n    const h = String(Math.floor(total / 3600)).padStart(2, '0');\n    const m = String(Math.floor((total % 3600) / 60)).padStart(2, '0');\n    const s = String(total % 60).padStart(2, '0');\n    return `${h}:${m}:${s}`;\n  }\n\n  renderVals() {\n    const intensity = this.props.filterIntensity ?? 1;\n    const saturate = 1.1 + 0.5 * intensity;\n    const contrast = 1.05 + 0.15 * intensity;\n    const hue = 2 * intensity;\n    const vhsFilter = `saturate(${saturate}) contrast(${contrast}) brightness(0.92) hue-rotate(${hue}deg) blur(0.3px)`;\n\n    const isMobile = this.state.viewportWidth <= 700;\n\n    const gridPadding = isMobile ? '20px 16px' : '40px';\n    const blockColumn = isMobile ? '1 / span 12' : '1 / span 5';\n    const blockRow = isMobile ? '1 / span 4' : '1 / span 3';\n    const blockMarginLeft = isMobile ? '0px' : '10px';\n    const blockGap = isMobile ? '10px' : '14px';\n    const nameSize = isMobile ? '14px' : '15px';\n    const bioSize = isMobile ? '12.5px' : '13px';\n    const bioMaxWidth = isMobile ? '82vw' : '280px';\n    const pathSize = isMobile ? '10px' : '11px';\n    const pathMaxWidth = isMobile ? '82vw' : '300px';\n    const contactSize = isMobile ? '11.5px' : '12px';\n    const timecodeBottom = isMobile ? '16px' : '28px';\n    const timecodeRight = isMobile ? '16px' : '32px';\n    const timecodeSize = isMobile ? '11px' : '13px';\n    const videoObjectPosition = isMobile ? 'center 30%' : 'center center';\n\n    return {\n      videoRef: this.videoRef,\n      videoSrc: 'video-bg-lucca.mp4',\n      vhsFilter,\n      videoObjectPosition,\n      scanlineOpacity: this.props.scanlines ?? 0.35,\n      showTimecode: this.props.showTimecode ?? true,\n      timecode: this.formatTimecode(),\n      email: this.props.email ?? 'hello@allucca.com',\n      linkedin: this.props.linkedin ?? 'https://www.linkedin.com/in/allucca',\n      gridPadding,\n      blockColumn,\n      blockRow,\n      blockMarginLeft,\n      blockGap,\n      nameSize,\n      bioSize,\n      bioMaxWidth,\n      pathSize,\n      pathMaxWidth,\n      contactSize,\n      timecodeBottom,\n      timecodeRight,\n      timecodeSize\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
