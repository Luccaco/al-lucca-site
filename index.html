<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Al Lucca</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #050505; height: 100%; }
  body { font-family: 'Roboto Mono', 'Courier New', monospace; }

  @keyframes vhsflicker {
    0% { opacity: 0.97; }
    20% { opacity: 1; }
    22% { opacity: 0.94; }
    24% { opacity: 1; }
    55% { opacity: 0.98; }
    57% { opacity: 0.9; }
    59% { opacity: 1; }
    100% { opacity: 1; }
  }
  @keyframes scanroll {
    0% { transform: translateY(0%); }
    100% { transform: translateY(100%); }
  }
  @keyframes noiseShift {
    0%, 100% { transform: translate(0,0); }
    10% { transform: translate(-1%,-1%); }
    20% { transform: translate(1%,1%); }
    30% { transform: translate(-1%,1%); }
    40% { transform: translate(1%,-1%); }
    50% { transform: translate(-1%,0%); }
    60% { transform: translate(1%,0%); }
    70% { transform: translate(0%,-1%); }
    80% { transform: translate(0%,1%); }
    90% { transform: translate(-1%,-1%); }
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #050505;
  }

  .bg-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    <!--filter: saturate(1.6) contrast(1.2) brightness(0.92) hue-rotate(2deg) blur(0.3px);-->
    animation: vhsflicker 3.2s infinite steps(1);
    z-index: 1;
  }
  @media (max-width: 700px) {
    .bg-video { object-position: center 30%; }
  }

  .aberration {
    position: absolute;
    inset: 0;
    z-index: 2;
    mix-blend-mode: screen;
    pointer-events: none;
    box-shadow: inset 0 0 180px rgba(0,0,0,0.55);
  }

  .scanlines {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    opacity: 0.35;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.35) 0px, rgba(0,0,0,0.35) 1px, transparent 1px, transparent 3px);
    mix-blend-mode: multiply;
  }

  .scanband {
    position: absolute;
    left: 0; right: 0;
    height: 8%;
    top: -8%;
    z-index: 4;
    pointer-events: none;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.05), transparent);
    animation: scanroll 7s linear infinite;
  }

  .grain {
    position: absolute;
    inset: -2%;
    z-index: 5;
    pointer-events: none;
    opacity: 0.18;
    mix-blend-mode: overlay;
    animation: noiseShift 0.4s steps(2) infinite;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%25" height="100%25" filter="url(%23n)"/></svg>');
    background-size: 180px 180px;
  }

  .vignette {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.55) 100%);
  }

  .timecode {
    position: absolute;
    bottom: 28px;
    right: 32px;
    z-index: 8;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.75);
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
    mix-blend-mode: screen;
  }
  @media (max-width: 700px) {
    .timecode { bottom: 16px; right: 16px; font-size: 11px; }
  }

  .content {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: repeat(6, 1fr);
    padding: 40px;
    box-sizing: border-box;
    pointer-events: none;
  }
  @media (max-width: 700px) {
    .content { padding: 20px 16px; }
  }

  .block {
    grid-column: 1 / span 5;
    grid-row: 1 / span 3;
    display: flex;
    flex-direction: column;
    gap: 14px;
    pointer-events: auto;
    margin-left: 10px;
  }
  @media (max-width: 700px) {
    .block { grid-column: 1 / span 12; grid-row: 1 / span 4; gap: 10px; margin-left: 0; }
  }

  .name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: #fff;
    text-transform: uppercase;
  }
  @media (max-width: 700px) {
    .name { font-size: 14px; }
  }

  .bio {
    font-size: 13px;
    line-height: 1.55;
    color: rgba(255,255,255,0.88);
    max-width: 280px;
    font-weight: 400;
    letter-spacing: 0.1px;
  }
  @media (max-width: 700px) {
    .bio { font-size: 12.5px; max-width: 82vw; }
  }

  .path {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.8px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    max-width: 300px;
  }
  @media (max-width: 700px) {
    .path { font-size: 10px; max-width: 82vw; }
  }

  .contact {
    font-size: 12px;
    line-height: 1.6;
    color: rgba(255,255,255,0.75);
  }
  @media (max-width: 700px) {
    .contact { font-size: 11.5px; }
  }
  .contact a {
    color: #fff;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
</style>
</head>
<body>

<div class="stage">

  <video class="bg-video" src="video-bg-lucca.mp4" autoplay muted loop playsinline></video>

  <div class="aberration"></div>
  <div class="scanlines"></div>
  <div class="scanband"></div>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="timecode" id="timecode">REC ● 00:00:00</div>

  <div class="content">
    <div class="block">
      <div class="name">Al Lucca</div>

      <p class="bio">NY based, hands-on design leader with nearly two decades of experience shaping high-profile products.</p>

      <div class="path">
        <span>Sky TV</span><span>→</span>
        <span>United Nations</span><span>→</span>
        <span>Paramount</span><span>→</span>
        <span>Axios</span><span>→</span>
        <span>Semafor</span><span>→</span>
        <span>Fubo (Disney)</span>
      </div>

      <p class="contact">
        Get in touch by <a href="mailto:hello@allucca.com">email</a>
        or <a href="https://www.linkedin.com/in/allucca" target="_blank" rel="noopener">DM me on LinkedIn</a>
      </p>
    </div>
  </div>

</div>

<script>
  let seconds = 0;
  const tc = document.getElementById('timecode');
  function pad(n) { return String(n).padStart(2, '0'); }
  function tick() {
    seconds += 1;
    const h = pad(Math.floor(seconds / 3600));
    const m = pad(Math.floor((seconds % 3600) / 60));
    const s = pad(seconds % 60);
    tc.textContent = 'REC \u25CF ' + h + ':' + m + ':' + s;
  }
  setInterval(tick, 1000);

  document.addEventListener('DOMContentLoaded', function () {
    const v = document.querySelector('.bg-video');
    if (v) {
      const p = v.play();
      if (p && p.catch) p.catch(function () {});
    }
  });
</script>

</body>
</html>
